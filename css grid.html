<html>
    <head>
        <title>CSS Grid</title>
        <style>
            .parent{
                background-color: lightblue;
                display: grid;
                grid-template-columns: auto auto auto;
            }
            div{
                background-color: goldenrod;
                padding: 10px;
                margin: 10%;
            }
        </style>
    </head>
    <body>
        <h1>CSS Grid</h1>
        <div class = "parent">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
        </div>
    </body>
</html>
