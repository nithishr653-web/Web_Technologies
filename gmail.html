<!DOCTYPE html>
<html>
<head>
    <title>Google Sign In</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#202124;
            color:white;
        }

        .container{
            width:90%;
            max-width:1200px;
            height:500px;
            background:black;
            margin:80px auto;
            border-radius:30px;
            display:flex;
            justify-content:space-between;
            padding:50px;
        }

        .left{
            width:45%;
        }

        .logo{
            font-size:50px;
            font-weight:bold;
            color:#4285F4;
        }

        .left h1{
            margin-top:30px;
            font-size:50px;
            font-weight:400;
        }

        .left p{
            margin-top:20px;
            font-size:22px;
            line-height:1.5;
        }

        .right{
            width:50%;
            margin-top:100px;
        }

        input{
            width:100%;
            padding:18px;
            background:black;
            color:white;
            border:2px solid #8ab4f8;
            border-radius:5px;
            font-size:18px;
        }

        .forgot{
            color:#8ab4f8;
            margin-top:15px;
            display:block;
            text-decoration:none;
        }
        .text{
            margin-top:70px;
            color:#bdc1c6;
            font-size:18px;
        }

        .bottom{
            margin-top:70px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .create{
            color:#8ab4f8;
            text-decoration:none;
            font-size:18px;
        }

        button{
            background:#8ab4f8;
            border:none;
            padding:15px 35px;
            border-radius:25px;
            font-size:18px;
            cursor:pointer;
        }

        footer{
            width:90%;
            margin:auto;
            color:white;
            display:flex;
            justify-content:space-between;
            padding-bottom:20px;
        }

        footer a{
            color:white;
            text-decoration:none;
            margin-left:25px;
        }
        .logo img{
    width:90px;
    height:auto;
}
    </style>
</head>

<body>

<div class="container">

    <div class="left">
        <div class="logo">
    <img src="./google img.png" alt="Google Logo">
</div>

        <h1>Sign in</h1>

        <p>
            with your Google Account to continue to Gmail.
            This account will be available to other Google apps
            in the browser.
        </p>
    </div>

    <div class="right">

        <input type="text" placeholder="Email or phone">

        <a href="#" class="forgot">Forgot email?</a>

        <p class="text">
            Not your computer? Use Guest mode to sign in privately.
            Learn more about using Guest mode.
        </p>

        <div class="bottom">
            <a href="#" class="create">Create account</a>

            <button>Next</button>
        </div>

    </div>

</div>

<footer>
    <span>English (United Kingdom)</span>

    <div>
        <a href="#">Help</a>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
    </div>
</footer>

</body>
</html>
